<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <title>Gestione Ordini Bar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles/reset.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/bottomNav.css">
  <link rel="manifest" href="manifest.json">
  <script>
    if (sessionStorage.getItem('admin_order_mode')) {
      document.documentElement.style.visibility = 'hidden';
    }
  </script>
</head>
<body>
  <div id="update-toast" class="hidden">
    <span>Nuova versione disponibile!</span>
    <button id="refresh-btn" class="btn-primary btn-sm">Aggiorna</button>
  </div>

  <div id="progressContainer" class="progress-container hidden">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <main class="container">
    <div id="login-container">
      <h1 class="main-title">Accesso Riservato</h1>
      <div id="login-form" style="width:100%;">
        <div class="form-group">
          <input type="email" id="login-email" class="form-control" placeholder="Email">
        </div>
        <div class="password-wrapper">
          <input type="password" id="login-password" class="form-control" placeholder="Password">
          <span id="togglePassword" class="toggle-icon"></span>
        </div>
        <button id="loginBtn" class="btn-success">Accedi</button>
        <button id="installBtnLogin" class="btn-install btn-success hidden">Installa l'App</button>
      </div>
    </div>

    <div id="app-content" class="hidden">
      <div id="home">
        <h1 class="main-title">Ordini Bar</h1>
        <button id="startBtn" class="btn-primary">Inizia Nuovo Ordine</button>
        <button id="installBtnHome" class="btn-install btn-success hidden">Installa App</button>
      </div>

      <div id="step" class="hidden">
        <header class="header">
          <h2 id="categoriaNome" class="main-title" style="margin-bottom:0;"></h2>
          <div class="nav-buttons" style="display:flex; gap:10px;">
            <button id="indietroBtn" class="btn-secondary btn-half"></button>
            <button id="avantiBtn"   class="btn-primary   btn-half"></button>
          </div>
        </header>
        <div id="prodottiContainer"></div>
      </div>

      <div id="riepilogo" class="hidden">
        <textarea id="messaggioFinale" readonly></textarea>
        <button id="copiaBtn"             class="btn-info">Copia Messaggio</button>
        <button id="whatsappBtn"          class="btn-whatsapp">Apri WhatsApp</button>
        <button id="riepilogoIndietroBtn" class="btn-light">Modifica</button>
        <button id="nuovoOrdineBtn"       class="btn-danger">Inizia Nuovo Ordine</button>
      </div>

      <!-- Pagina profilo utente: contenuto iniettato da profileView.js -->
      <div id="profile" class="hidden"></div>
    </div>
  </main>

  <!-- Bottom nav: contenuto iniettato da bottomNav.js -->
  <div id="bottom-nav" class="hidden"></div>

  <script src="js/pwa-install.js" defer></script>
  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(console.error);
      });
    }
  </script>
</body>
</html>
