<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <title>Gestione Ordini Bar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles/reset.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="update-toast" class="hidden">
    <span>Nuova versione disponibile!</span>
    <button id="refresh-btn" class="btn-primary btn-sm">Aggiorna</button>
  </div>

  <div id="progressContainer" class="progress-container hidden">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <main class="container">
    <div id="login-container">
      <h1 class="main-title">Accesso Riservato</h1>
      <div id="login-form" style="width: 100%;">
        <div class="form-group">
          <input type="email" id="login-email" class="form-control" placeholder="Email">
        </div>
        
        <div class="password-wrapper">
          <input type="password" id="login-password" class="form-control" placeholder="Password">
          <span id="togglePassword" class="toggle-icon"></span>
        </div>
        
        <button id="loginBtn" class="btn-success">Accedi</button>
        <button id="installBtnLogin" class="btn-success hidden">Installa l'App</button>
      </div>
    </div>

    <div id="app-content" class="hidden">
      <div id="home">
        <h1 class="main-title">Ordini Bar</h1>
        <button id="startBtn" class="btn-primary">Inizia Nuovo Ordine</button>
        <button id="logoutBtn" class="btn-danger">Esci dall'account</button>
        <button id="installBtnHome" class="btn-success hidden">Installa App</button>
      </div>
      
      <div id="step" class="hidden">
        <header class="header">
          <h2 id="categoriaNome" class="main-title" style="margin-bottom:0;"></h2>
          <div class="nav-buttons" style="display:flex; gap:10px;">
            <button id="indietroBtn" class="btn-secondary btn-half"></button>
            <button id="avantiBtn" class="btn-primary btn-half"></button>
          </div>
        </header>
        <div id="prodottiContainer"></div>
      </div>

      <div id="riepilogo" class="hidden">
        <textarea id="messaggioFinale" readonly></textarea>
        <button id="copiaBtn" class="btn-info">Copia Messaggio</button>
        <button id="whatsappBtn" class="btn-whatsapp">Apri WhatsApp</button>
        <button id="riepilogoIndietroBtn" class="btn-light">Modifica</button>
        <button id="nuovoOrdineBtn" class="btn-danger">Inizia Nuovo Ordine</button>
      </div>
    </div>

    <div id="admin-content" class="hidden">
      <header class="admin-header">
          <h2 id="adminTitleHeader" style="margin:0;">Area Gestionale</h2>
          <button id="logoutAdminBtn" class="btn-danger btn-sm"></button>
      </header>
      <div id="breadcrumbs"></div>
      <div id="admin-view"></div>
    </div>
  </main>

  <div id="productModal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modalTitle">Gestione Prodotto</h3>
      <input type="hidden" id="modalProductId">
      
      <div class="form-group" id="group-nome">
        <label>Nome Prodotto</label>
        <input type="text" id="modalProdNome" class="form-control" placeholder="es. Croissant">
      </div>

      <div class="form-group" id="group-categoria">
        <label>Categoria</label>
        <div class="select-wrapper">
          <input type="text" id="modalProdCat" class="form-control" placeholder="Scrivi o scegli...">
          <select id="selectCatQuick">
            <option value="">-- Esistenti --</option>
          </select>
        </div>
      </div>

      <div class="form-group" id="group-fornitore">
        <label>Fornitore</label>
        <div class="select-wrapper">
          <input type="text" id="modalProdFornitore" class="form-control" placeholder="Scrivi o scegli...">
          <select id="selectFornQuick">
            <option value="">-- Esistenti --</option>
          </select>
        </div>
      </div>

      <div class="modal-buttons">
        <button id="closeModalBtn" class="btn-light btn-half">Annulla</button>
        <button id="saveProductBtn" class="btn-primary btn-half"></button>
      </div>
    </div>
  </div>

  <script type="module">
    import { ui } from "./js/ui.js"; 
    import { firebaseConfig } from "./js/constants.js";
    import { getIconHTML } from "./js/icons.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { 
      getFirestore, collection, getDocs, getDoc, setDoc, addDoc, doc, deleteDoc, query, where, orderBy 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.fb = { 
      auth, db, signInWithEmailAndPassword, onAuthStateChanged, signOut,
      collection, getDocs, getDoc, setDoc, addDoc, doc, deleteDoc, query, where, orderBy
    };

    document.addEventListener('DOMContentLoaded', () => {
        const logoutAdminBtn = document.getElementById('logoutAdminBtn');
        const saveProductBtn = document.getElementById('saveProductBtn');
        const adminTitleHeader = document.getElementById('adminTitleHeader');
        
        if (logoutAdminBtn) logoutAdminBtn.innerHTML = getIconHTML('logout');
        if (saveProductBtn) saveProductBtn.innerHTML = `${getIconHTML('save')} Salva`;
        if (adminTitleHeader) adminTitleHeader.innerHTML = `${getIconHTML('admin')} Area Gestionale`;
    });

    const loginBtn = document.getElementById('loginBtn');
    if (loginBtn) {
      loginBtn.onclick = async () => {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-password').value;
        
        if(!email || !pass) return alert("Inserisci email e password");

        ui.showLoader();

        try {
          await signInWithEmailAndPassword(auth, email, pass);
          ui.showToast("Accesso in corso...");
        } catch (error) {
          console.error(error);
          ui.hideLoader(); 
          alert("Credenziali non valide");
        }
      };
    }
  </script>

  <script src="js/pwa-install.js" defer></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
