<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <title>Gestione Ordini Bar</title>
  <link rel="stylesheet" href="styles/reset.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="update-toast" class="hidden">
    <span>Nuova versione disponibile!</span>
    <button id="refresh-btn">Aggiorna</button>
  </div>

  <div id="progressContainer" class="progress-container hidden">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <main class="container"> 
    <div id="login-container">
      <h1 class="main-title">Accesso Riservato</h1>
      <div id="login-form">
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Password">
        <button id="loginBtn">Accedi</button>
      </div>
    </div>

    <div id="app-content" class="hidden">
      <div id="home">
        <h1 class="main-title">Ordini Bar</h1>
        <button id="startBtn">Inizia Nuovo Ordine</button>
        <button id="logoutBtn" style="background:none; color:gray; border:none; margin-top:20px; cursor:pointer; text-decoration: underline;">Esci dall'account</button>
        <button id="installBtn" class="btn-install hidden">Installa App</button>
      </div>
      
      <div id="step" class="hidden">
        <header class="header">
          <h2 id="categoriaNome"></h2>
          <div class="nav-buttons">
            <button id="indietroBtn" class="btn-small">Indietro</button>
            <button id="avantiBtn" class="btn-small">Avanti</button>
          </div>
        </header>
        <div id="prodottiContainer"></div>
      </div>

      <div id="riepilogo" class="hidden">
        <textarea id="messaggioFinale" readonly></textarea>
        <button id="copiaBtn" class="btn-action">Copia Messaggio</button>
        <button id="whatsappBtn" class="btn-whatsapp">Apri WhatsApp</button>
        <button id="riepilogoIndietroBtn" class="btn-secondary">Torna alla modifica</button>
        <button id="nuovoOrdineBtn" class="btn-danger">Inizia Nuovo Ordine</button>
      </div>
    </div>

    <div id="admin-content" class="hidden">
      <header>
          <h2>Area Superadmin</h2>
          <button id="logoutAdminBtn">Esci</button>
      </header>
      <div id="breadcrumbs"></div>
      <div id="admin-view"></div>
    </div>
  </main>

  <script type="module">
    import { firebaseConfig } from "./js/constants.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword, 
      onAuthStateChanged, 
      signOut 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { 
      getFirestore, 
      collection, 
      getDocs, 
      getDoc,
      setDoc,
      addDoc, 
      doc, 
      deleteDoc, 
      query, 
      where 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.fb = { 
      auth, db,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut,
      collection,
      getDocs,
      getDoc,
      setDoc,
      addDoc,
      doc,
      deleteDoc,
      query,
      where
    };
  </script>

  <script src="js/pwa-install.js" defer></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
